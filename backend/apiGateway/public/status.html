<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Status — Quizologist</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg width='40' height='48' viewBox='0 0 40 48' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 24C10 18.4772 14.4772 14 20 14C25.5229 14 30 18.4772 30 24L40 24C40 12.9543 31.0457 4 20 4C8.95431 4 9.65645e-07 12.9543 0 24C-9.65645e-07 35.0457 8.9543 44 20 44L20 34C14.4772 34 10 29.5229 10 24Z' fill='%237C3AED'/%3E%3Cpath opacity='0.5' d='M20 24H30V34H20V24Z' fill='%237C3AED'/%3E%3Cpath d='M37.3244 34H30V41.3244C33.0363 39.568 35.568 37.0363 37.3244 34Z' fill='%237C3AED'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    :root,
    [data-theme="dark"] {
      --bg: #0a1628;
      --surface: #0f1d32;
      --surface-hover: #162540;
      --surface-card: #12203a;
      --text: #f0f4f8;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #1e3a5f;
      --border-subtle: #162a45;
      --green: #00ed64;
      --green-dark: #00c853;
      --green-dim: rgba(0, 237, 100, 0.1);
      --red: #ff5252;
      --red-dim: rgba(255, 82, 82, 0.1);
      --yellow: #ffc107;
      --yellow-dim: rgba(255, 193, 7, 0.1);
      --accent-purple: #a78bfa;
      --accent-orange: #fb923c;
      --accent-teal: #2dd4bf;
      --accent-blue: #60a5fa;
      --font: 'Ubuntu Mono', 'SF Mono', 'Consolas', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-pill: 9999px;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --surface-card: #ffffff;
      --text: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --border-subtle: #f1f5f9;
      --green: #16a34a;
      --green-dark: #15803d;
      --green-dim: rgba(22, 163, 74, 0.08);
      --red: #dc2626;
      --red-dim: rgba(220, 38, 38, 0.08);
      --yellow: #ca8a04;
      --yellow-dim: rgba(202, 138, 4, 0.08);
      --accent-purple: #7c3aed;
      --accent-orange: #ea580c;
      --accent-teal: #0d9488;
      --accent-blue: #2563eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.55;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
    }

    .brand-mark svg {
      width: 30px;
      height: 30px;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .theme-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 20px;
      transition: all 0.2s;
    }

    .theme-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    /* Banner */
    .banner {
      padding: 16px 20px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .banner.ok {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(0, 237, 100, 0.2);
    }

    .banner.down {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(255, 82, 82, 0.2);
    }

    .banner.checking {
      background: var(--yellow-dim);
      color: var(--yellow);
      border: 1px solid rgba(255, 193, 7, 0.2);
    }

    .banner-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: currentColor;
    }

    /* Section Labels */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Uptime Cards */
    .uptime-section {
      margin-bottom: 40px;
    }

    .uptime-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 8px;
    }

    .uptime-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .uptime-card-name {
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .uptime-card-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
    }

    .uptime-card-dot.up {
      background: var(--green);
    }

    .uptime-card-dot.down {
      background: var(--red);
    }

    .uptime-card-percent {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 700;
    }

    .uptime-bars {
      display: flex;
      gap: 2px;
      height: 28px;
      align-items: stretch;
    }

    .uptime-bar {
      flex: 1;
      border-radius: 3px;
      min-height: 100%;
      position: relative;
      cursor: default;
      transition: opacity 0.15s;
    }

    .uptime-bar:hover {
      opacity: 0.75;
    }

    .uptime-bar.up {
      background: var(--green);
    }

    .uptime-bar.partial {
      background: var(--yellow);
    }

    .uptime-bar.down {
      background: var(--red);
    }

    .uptime-bar:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    .uptime-range {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .uptime-value {
      font-weight: 700;
      color: var(--text-secondary);
    }

    /* Incidents Collapsible */
    .incidents {
      margin-bottom: 40px;
    }

    .collapsible-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 16px 20px;
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      list-style: none;
      text-align: left;
    }

    .collapsible-trigger:hover {
      background: var(--surface-hover);
    }

    .collapsible-trigger .material-icons-outlined {
      font-size: 20px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .collapsible-trigger[aria-expanded="true"] .rotate-icon {
      transform: rotate(180deg);
    }

    .collapsible-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .collapsible-content.open {
      max-height: 2000px;
    }

    .collapsible-inner {
      padding-top: 8px;
    }

    .incident-group {
      margin-bottom: 12px;
    }

    .incident-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 8px;
    }

    .incident-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
    }

    .incident-dot {
      width: 6px;
      height: 6px;
      border-radius: var(--radius-pill);
      background: var(--red);
      margin-top: 6px;
      flex-shrink: 0;
    }

    .incident-body {
      flex: 1;
    }

    .incident-service {
      font-size: 14px;
      font-weight: 700;
    }

    .incident-time {
      font-size: 13px;
      color: var(--text-muted);
    }

    .incident-error {
      font-size: 13px;
      color: var(--red);
      margin-top: 2px;
    }

    .no-incidents {
      font-size: 14px;
      color: var(--text-muted);
      padding: 12px 0;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: var(--radius-pill);
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .page {
        padding: 32px 16px;
      }

      .header {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }

      .footer {
        flex-direction: column;
        gap: 6px;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="brand">
        <div class="brand-mark">
          <svg width="40" height="48" viewBox="0 0 40 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M10 24C10 18.4772 14.4772 14 20 14C25.5229 14 30 18.4772 30 24L40 24C40 12.9543 31.0457 4 20 4C8.95431 4 9.65645e-07 12.9543 0 24C-9.65645e-07 35.0457 8.9543 44 20 44L20 34C14.4772 34 10 29.5229 10 24Z"
              fill="#7C3AED" />
            <path opacity="0.5" d="M20 24H30V34H20V24Z" fill="#7C3AED" />
            <path d="M37.3244 34H30V41.3244C33.0363 39.568 35.568 37.0363 37.3244 34Z" fill="#7C3AED" />
          </svg>
        </div>
        <span class="brand-name">Quizologist</span>
      </div>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
        <span id="themeIcon" class="material-icons-outlined">dark_mode</span>
      </button>
    </header>

    <div class="banner checking" id="banner">
      <div class="banner-dot"></div>
      <span id="bannerText">Checking systems...</span>
    </div>

    <div class="uptime-section">
      <p class="section-label">Uptime — 90 days</p>
      <div id="uptimeList">
        <div class="loading-state">Loading...</div>
      </div>
    </div>

    <div class="incidents">
      <p class="section-label">Incidents</p>
      <button class="collapsible-trigger" id="incidentsTrigger" aria-expanded="false">
        <span id="incidentsLabel">No incidents reported</span>
        <span class="material-icons-outlined rotate-icon">expand_more</span>
      </button>
      <div class="collapsible-content" id="incidentsContent">
        <div class="collapsible-inner" id="incidentsList"></div>
      </div>
    </div>

    <footer class="footer">
      <span>Updated <span id="lastUpdated">—</span></span>
      <div class="live-indicator">
        <div class="live-dot"></div>
        <span>Live · 30s</span>
      </div>
    </footer>
  </div>

  <script>
    const html = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');
    const themeBtn = document.getElementById('themeToggle');

    // Theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);
    themeIcon.textContent = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';

    themeBtn.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeIcon.textContent = next === 'dark' ? 'light_mode' : 'dark_mode';
    });

    // Collapsible incidents
    const trigger = document.getElementById('incidentsTrigger');
    const content = document.getElementById('incidentsContent');

    trigger.addEventListener('click', () => {
      const expanded = trigger.getAttribute('aria-expanded') === 'true';
      trigger.setAttribute('aria-expanded', !expanded);
      content.classList.toggle('open');
    });

    // Helpers
    const fmtDate = (s) => new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

    const renderBars = (history) => history.map(d => {
      let cls = 'up';
      if (d.status === 'DOWN') {
        cls = 'down';
      } else if (d.status === 'PARTIAL') {
        cls = 'partial';
      }
      const tip = `${fmtDate(d.date)}: ${d.status}`;
      return `<div class="uptime-bar ${cls}" data-tip="${tip}"></div>`;
    }).join('');

    const renderUptime = (services) => services.map(s => `
      <div class="uptime-card">
        <div class="uptime-card-header">
          <div class="uptime-card-name">
            <div class="uptime-card-dot ${s.currentStatus === 'UP' ? 'up' : 'down'}"></div>
            ${s.name}
          </div>
          <span class="uptime-card-percent">${s.uptime90d}%</span>
        </div>
        <div class="uptime-bars">${renderBars(s.history)}</div>
        <div class="uptime-range">
          <span>90d ago</span>
          <span class="uptime-value">${s.uptime90d}%</span>
          <span>Today</span>
        </div>
      </div>
    `).join('');

    const renderIncidents = (incidents) => {
      if (!incidents.length) {
        document.getElementById('incidentsLabel').textContent = 'No incidents reported';
        return '';
      }
      document.getElementById('incidentsLabel').textContent = `${incidents.length} incident(s)`;
      return incidents.map(g => `
        <div class="incident-group">
          <div class="incident-date">${fmtDate(g.date)}</div>
          ${g.services.map(s => `
            <div class="incident-row">
              <div class="incident-dot"></div>
              <div class="incident-body">
                <div class="incident-service">${s.name}</div>
                <div class="incident-time">${s.time}</div>
                ${s.error ? `<div class="incident-error">${s.error}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>`).join('');
    };

    // Fetch
    async function refresh() {
      try {
        const res = await fetch('/api/internal/status/history');
        const { success, data } = await res.json();
        if (!success) throw new Error();

        const allUp = data.services.every(s => s.currentStatus === 'UP');
        document.getElementById('banner').className = `banner ${allUp ? 'ok' : 'down'}`;
        document.getElementById('bannerText').textContent = allUp ? 'All Systems Operational' : 'Some Systems Down';

        document.getElementById('uptimeList').innerHTML = renderUptime(data.services);
        document.getElementById('incidentsList').innerHTML = renderIncidents(data.incidents);
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
      } catch {
        document.getElementById('banner').className = 'banner down';
        document.getElementById('bannerText').textContent = 'Cannot reach API Gateway';
        document.getElementById('uptimeList').innerHTML = '<div class="loading-state">Connection error</div>';
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>

</html>
