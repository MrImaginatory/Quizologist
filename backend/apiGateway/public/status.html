<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ---- Theme: Light ---- */
    :root {
      --bg-page: #F9FAFB;
      --bg-surface: #FFFFFF;
      --bg-surface-hover: #F3F4F6;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;
      --green: #10B981;
      --green-soft: #D1FAE5;
      --green-border: #A7F3D0;
      --red: #EF4444;
      --red-soft: #FEE2E2;
      --red-border: #FECACA;
      --amber: #F59E0B;
      --amber-soft: #FEF3C7;
      --amber-border: #FDE68A;
      --primary: #6366F1;
      --primary-soft: #EEF2FF;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-base: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius-sm: 0.25rem;
      --radius-base: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ---- Theme: Dark ---- */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page: #0F1117;
        --bg-surface: #1A1D27;
        --bg-surface-hover: #242836;
        --text-primary: #F3F4F6;
        --text-secondary: #9CA3AF;
        --border: #2D3244;
        --border-strong: #3E4458;
        --green: #34D399;
        --green-soft: rgba(16, 185, 129, 0.12);
        --green-border: rgba(52, 211, 153, 0.25);
        --red: #F87171;
        --red-soft: rgba(239, 68, 68, 0.12);
        --red-border: rgba(248, 113, 113, 0.25);
        --amber: #FBBF24;
        --amber-soft: rgba(245, 158, 11, 0.12);
        --amber-border: rgba(251, 191, 36, 0.25);
        --primary: #818CF8;
        --primary-soft: rgba(99, 102, 241, 0.1);
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.2);
        --shadow-base: 0 1px 3px 0 rgb(0 0 0 / 0.3), 0 1px 2px -1px rgb(0 0 0 / 0.25);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.25);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background-color: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 1.5rem 3rem;
    }

    /* Header */
    .header {
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.25rem;
    }

    .header p {
      font-size: 0.9375rem;
      color: var(--text-secondary);
    }

    /* Banner */
    .banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.125rem;
      border-radius: var(--radius-lg);
      margin-bottom: 2rem;
      transition: background 200ms ease, border-color 200ms ease;
    }

    .banner.operational {
      background: var(--green-soft);
      border: 1px solid var(--green-border);
    }

    .banner.degraded {
      background: var(--red-soft);
      border: 1px solid var(--red-border);
    }

    .banner.checking {
      background: var(--amber-soft);
      border: 1px solid var(--amber-border);
    }

    .banner-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .banner.operational .banner-dot {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.18);
    }

    .banner.degraded .banner-dot {
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18);
    }

    .banner.checking .banner-dot {
      background: var(--amber);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .banner-text {
      font-size: 0.9375rem;
      font-weight: 500;
    }

    /* Service list */
    .services {
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .service-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(6px);
      animation: fadeUp 0.35s ease forwards;
    }

    .service-row:last-child {
      border-bottom: none;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .service-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .service-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .service-dot.up {
      background: var(--green);
    }

    .service-dot.down {
      background: var(--red);
    }

    .service-dot.loading {
      background: var(--amber);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .service-name {
      font-size: 0.9375rem;
      font-weight: 500;
      text-transform: capitalize;
    }

    .service-status {
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .service-status.up {
      color: var(--green);
    }

    .service-status.down {
      color: var(--red);
    }

    .service-error {
      padding: 0.5rem 0.75rem;
      margin: 0 1.25rem 0.75rem;
      background: var(--red-soft);
      border-left: 2px solid var(--red);
      color: var(--red);
      font-size: 0.8125rem;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    /* Loader */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 0;
      gap: 0.75rem;
    }

    .loader-ring {
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .auto-refresh {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .auto-refresh-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
    }

    /* Error state */
    .error-state {
      text-align: center;
      padding: 3rem 1.5rem;
    }

    .error-state h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
    }

    .error-state p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    @media (max-width: 480px) {
      .page {
        padding: 2.5rem 1rem 2rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .footer {
        flex-direction: column;
        gap: 0.5rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Status</h1>
      <p>Service health at a glance</p>
    </div>

    <div class="banner checking" id="banner">
      <div class="banner-dot"></div>
      <span class="banner-text">Checking systems&hellip;</span>
    </div>

    <div id="services-list" class="services">
      <div class="loader">
        <div class="loader-ring"></div>
        <span class="loader-text">Loading&hellip;</span>
      </div>
    </div>

    <div class="footer">
      <span>Updated <span id="last-updated">never</span></span>
      <div class="auto-refresh">
        <div class="auto-refresh-dot"></div>
        <span>Auto-refresh 30s</span>
      </div>
    </div>
  </div>

  <script>
    async function fetchStatus() {
      const list = document.getElementById('services-list');
      const banner = document.getElementById('banner');
      const lastUpdated = document.getElementById('last-updated');

      try {
        const res = await fetch('/api/internal/status');
        const data = await res.json();
        const isAllUp = data.success;

        banner.className = `banner ${isAllUp ? 'operational' : 'degraded'}`;
        banner.innerHTML = `
          <div class="banner-dot"></div>
          <span class="banner-text">${data.message || (isAllUp ? 'All systems operational' : 'Some systems are down')}</span>
        `;

        if (data.data && Array.isArray(data.data)) {
          list.innerHTML = data.data.map((service, i) => {
            const isUp = service.status === 'UP';
            const name = service.name.replace(/-/g, ' ');

            let errorHtml = '';
            if (!isUp && service.error) {
              errorHtml = `<div class="service-error">${service.error}</div>`;
            }

            return `
              <div class="service-row" style="animation-delay: ${i * 50}ms">
                <div class="service-left">
                  <div class="service-dot ${isUp ? 'up' : 'down'}"></div>
                  <span class="service-name">${name}</span>
                </div>
                <span class="service-status ${isUp ? 'up' : 'down'}">${isUp ? 'Running' : 'Down'}</span>
              </div>
              ${errorHtml}
            `;
          }).join('');
        }

      } catch (err) {
        banner.className = 'banner degraded';
        banner.innerHTML = `
          <div class="banner-dot"></div>
          <span class="banner-text">Cannot reach API Gateway</span>
        `;

        list.innerHTML = `
          <div class="error-state">
            <h3>Connection Error</h3>
            <p>Could not fetch status data. Ensure the API Gateway is running.</p>
          </div>
        `;
      }

      lastUpdated.textContent = new Date().toLocaleTimeString();
    }

    fetchStatus();
    setInterval(fetchStatus, 30000);
  </script>
</body>
</html>
